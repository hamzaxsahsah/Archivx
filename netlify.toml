[build]
  command   = "npm run build"
  publish   = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION            = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # NEXT_PUBLIC_* vars are intentionally baked into the client bundle.
  # GOOGLE_OAUTH_AUTH_* values are standard public Google OAuth URLs that
  # also appear verbatim inside node_modules/google-auth-library.
  # Neither constitutes a leaked secret — tell Netlify to skip them.
  SECRETS_SCAN_OMIT_KEYS  = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID,NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID,NEXT_PUBLIC_APP_URL,GOOGLE_OAUTH_AUTH_URI,GOOGLE_OAUTH_TOKEN_URI,GOOGLE_OAUTH_AUTH_PROVIDER_X509_CERT_URL,GOOGLE_OAUTH_PROJECT_ID,GOOGLE_OAUTH_CLIENT_ID"
