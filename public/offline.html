<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d0f14" />
    <title>AchievHQ — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #0d0f14;
        color: #e8eaef;
      }
      .card {
        padding: 2rem;
        border: 1px solid #1e2330;
        border-radius: 12px;
        background: #141720;
        max-width: 360px;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
      }
      p {
        margin: 0;
        opacity: 0.85;
        line-height: 1.5;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        AchievHQ needs a connection for live Steam data. Cached covers may still
        load from your device.
      </p>
    </div>
  </body>
</html>
